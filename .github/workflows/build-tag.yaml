name: Build and Deploy Catalog from Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  LANG: en_US.UTF-8
  MAVEN_OPTS: -Xmx3000m
  MAVEN_ARGS: -V -ntp -Dhttp.keepAlive=false -DskipTests=true -e

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set versions
        run: |
          export C_VERSION="${GITHUB_REF_NAME#v}" 
          export C_REVISION="${GITHUB_SHA}" 
          
          echo "CONNECTORS_VERSION=${C_VERSION}" >> $GITHUB_ENV
          echo "CONNECTORS_REVISION=${C_REVISION}" >> $GITHUB_ENV
          echo "CONNECTORS_RELEASE=${C_VERSION}-${C_REVISION}" >> $GITHUB_ENV

      - name: Login to Container Registry
        uses: docker/login-action@v1
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_MCI_USR }}
          password: ${{ secrets.QUAY_MCI_PWD }}

      - name: Set SHA
        run: |
          for F in $(find etc/kubernetes/manifests/base/connectors -type f -name "*.json"); do
            IMAGE=$(jq -r '.channels.stable.shard_metadata.connector_image' "$F")
            NEW_IMAGE=$(skopeo inspect docker://$IMAGE --format "{{.Name}}@{{.Digest}}")
        
            echo "$IMAGE"
            echo "$NEW_IMAGE"
        
            jq --arg img "$NEW_IMAGE" '.channels.stable.shard_metadata.connector_image = ($img)' "$F" > "${F}.tmp"
            mv "${F}.tmp" "$F"
          done

      - name: Build Catalog Image
        run: |
          docker build -t "quay.io/rhoas/cos-fleet-catalog-camel:${CONNECTORS_RELEASE}" -f etc/Dockerfile.catalog .

      - name: Push Catalog Images
        run: |
          docker push "quay.io/rhoas/cos-fleet-catalog-camel:${CONNECTORS_RELEASE}"

      - name: "Create Release Branch for tag {{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: release-${{ env.CONNECTORS_RELEASE }}
        run: |
          echo ""
          echo "tag     : ${{ github.ref_name }}"
          echo "release : ${CONNECTORS_RELEASE}"
          echo "branch  : ${BRANCH_NAME}"
          echo ""

          git config user.email "mas-connectors@redhat.com" 
          git config user.name "mas-connectors"

          git checkout -b "${BRANCH_NAME}"
          git add .
          git commit -am "Create release branch for tag ${{ github.ref_name }}"
          git reset --hard
          git push -u origin "${BRANCH_NAME}"

  update-manifest:
    needs:
      - build
    uses: ./.github/workflows/update-manifest.yaml
    with:
      overlay: "staging"
    secrets:
      token: ${{ secrets.GH_TOKEN }}
